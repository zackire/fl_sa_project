version: '3.8'

services:
  fl-client:
    build: .
    container_name: fl_${CLIENT_ID}
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - SERVER_IP=${SERVER_IP}
      - CRYPTO_STACK=${CRYPTO_STACK}
      - PROTOCOL_MODE=${PROTOCOL_MODE:-secagg} 
    command: [
      "python", "main_client.py", 
      "--id", "${CLIENT_ID}", 
      "--ip", "${SERVER_IP}", 
      "--stack", "${CRYPTO_STACK}",
      "--ca", "/app/certs/ca.crt",
      "--cert", "/app/certs/client.crt",
      "--key", "/app/certs/client.key"
    ]
    volumes:
      - ./certs/clients/${CLIENT_ID}:/app/certs:ro
    networks:
      - fl_network

networks:
  fl_network:
    external: true
    name: fl_shared_bridge