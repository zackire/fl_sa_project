version: '3.8'

services:
  fl-client-1:
    build: .
    container_name: fl-client-1
    command: ["python", "main_client.py", "--id", "client_1", "--ip", "mqtt-broker", "--stack", "A"]
    restart: on-failure
    networks:
      - fl_network

  fl-client-2:
    build: .
    container_name: fl-client-2
    command: ["python", "main_client.py", "--id", "client_2", "--ip", "mqtt-broker", "--stack", "A"]
    restart: on-failure
    networks:
      - fl_network

  fl-client-3:
    build: .
    container_name: fl-client-3
    command: ["python", "main_client.py", "--id", "client_3", "--ip", "mqtt-broker", "--stack", "A"]
    restart: on-failure
    networks:
      - fl_network

networks:
  fl_network:
    external: true
    name: fl_shared_bridge