services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: fl_mosquitto_broker
    ports:
      - "1883:1883"
      - "9001:9001" # WebSockets port (optional, but good for debugging tools)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped