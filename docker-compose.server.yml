version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    networks:
      - fl_network

  fl-server:
    build: . # Assuming your Dockerfile is in the current directory
    container_name: fl-server
    # Passing the required args. Note the IP is the broker's container name!
    command: ["python", "main_server.py", "--ip", "mqtt-broker", "--k", "3", "--t", "2", "--stack", "A"]
    depends_on:
      - mqtt-broker
    restart: on-failure
    networks:
      - fl_network

networks:
  fl_network:
    name: fl_shared_bridge
    driver: bridge